<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>September Onboarding - Variant A</title>
    <style>
      :root {
        --bg: #ffffff;
        --page: #f4f4f5;
        --text: #18181b;
        --muted: #71717a;
        --soft: #f4f4f5;
        --line: #e4e4e7;
        --primary: #4f46e5;
        --primary-dark: #4338ca;
        --primary-soft: #eef2ff;
        --success: #059669;
        --success-soft: #ecfdf5;
        --warning-soft: #fffbeb;
        --warning-line: #fde68a;
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 35%, rgba(79, 70, 229, 0.1), transparent 36rem),
          radial-gradient(circle at 85% 80%, rgba(79, 70, 229, 0.06), transparent 30rem),
          var(--bg);
        font-family: "Noto Sans", Helvetica, Arial, sans-serif;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .shell {
        width: min(100%, 760px);
        max-width: 100vw;
        margin: 0 auto;
        padding: 48px 20px 40px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 32px;
        color: var(--primary);
        font-size: 14px;
        font-weight: 700;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: var(--primary);
        color: white;
        font-weight: 800;
      }

      .progress {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 42px;
      }

      .step-dot {
        min-width: 48px;
        height: 48px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: white;
        color: var(--muted);
        cursor: pointer;
      }

      .step-dot[aria-current="step"] {
        border-color: var(--primary);
        background: var(--primary);
        color: white;
        box-shadow: 0 0 0 4px var(--primary-soft);
      }

      .step-dot.done {
        border-color: #bbf7d0;
        background: var(--success-soft);
        color: var(--success);
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 1px 2px rgba(24, 24, 27, 0.06);
        padding: clamp(28px, 6vw, 48px);
      }

      .kicker {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        max-width: 12ch;
        overflow-wrap: break-word;
        font-size: clamp(34px, 6vw, 46px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .lede {
        margin: 16px 0 0;
        max-width: 60ch;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .body {
        margin-top: 36px;
      }

      .choices {
        display: grid;
        gap: 14px;
      }

      .choice {
        display: flex;
        min-width: 0;
        gap: 16px;
        align-items: flex-start;
        width: 100%;
        min-height: 68px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: white;
        padding: 18px;
        text-align: left;
        color: inherit;
        cursor: pointer;
      }

      .choice.selected {
        border-color: var(--primary);
        background: var(--primary-soft);
        box-shadow: 0 0 0 1px var(--primary);
      }

      .choice-dot {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--soft);
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .choice.selected .choice-dot {
        background: var(--primary);
        color: white;
      }

      .choice-title {
        display: block;
        overflow-wrap: break-word;
        font-size: 16px;
        font-weight: 700;
      }

      .choice-copy {
        display: block;
        margin-top: 4px;
        overflow-wrap: break-word;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .fields {
        display: grid;
        gap: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: white;
        color: var(--text);
        padding: 14px 16px;
        font-size: 16px;
      }

      textarea {
        min-height: 124px;
        resize: vertical;
        line-height: 1.5;
      }

      .note {
        margin-top: 18px;
        border: 1px solid var(--warning-line);
        border-radius: 12px;
        background: var(--warning-soft);
        padding: 14px 16px;
        color: #854d0e;
        font-size: 14px;
        line-height: 1.5;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 40px;
        padding-top: 24px;
        border-top: 1px solid var(--line);
      }

      .helper {
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: white;
        color: var(--text);
        padding: 0 18px;
        font-weight: 700;
        cursor: pointer;
      }

      .btn.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: white;
      }

      .btn.primary:hover {
        background: var(--primary-dark);
      }

      .sample {
        display: grid;
        gap: 10px;
      }

      .bubble {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--soft);
        padding: 14px 16px;
        overflow-wrap: break-word;
        font-size: 15px;
        line-height: 1.5;
      }

      @media (max-width: 640px) {
        .shell {
          padding-top: 28px;
        }

        .progress {
          gap: 6px;
          margin-bottom: 26px;
        }

        .step-dot {
          min-width: 44px;
          height: 44px;
        }

        .footer {
          align-items: stretch;
          flex-direction: column;
        }

        .actions {
          flex-direction: column-reverse;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="brand" aria-label="September">
        <span class="brand-mark">S</span>
        <span>September</span>
      </div>

      <nav class="progress" aria-label="Setup steps">
        <button class="step-dot" type="button" data-step="0">1</button>
        <button class="step-dot" type="button" data-step="1">2</button>
        <button class="step-dot" type="button" data-step="2">3</button>
        <button class="step-dot" type="button" data-step="3">4</button>
      </nav>

      <section class="panel" aria-live="polite">
        <p class="kicker" id="kicker"></p>
        <h1 id="title"></h1>
        <p class="lede" id="lede"></p>
        <div class="body" id="body"></div>
        <footer class="footer">
          <span class="helper" id="helper"></span>
          <div class="actions">
            <button class="btn" type="button" id="back">Back</button>
            <button class="btn primary" type="button" id="next">Continue</button>
          </div>
        </footer>
      </section>
    </main>

    <script>
      const steps = [
        {
          kicker: "Step 1 of 4",
          title: "Meet September",
          lede:
            "September helps you turn small taps or typed words into full sentences, then speaks them aloud.",
          helper: "No account needed to start.",
          button: "Start setup",
          body: `
            <div class="sample">
              <div class="bubble">I need a little more time to answer.</div>
              <div class="bubble">Could you move my chair closer to the window?</div>
              <div class="bubble">Thank you. That really helps.</div>
            </div>
          `,
        },
        {
          kicker: "Step 2 of 4",
          title: "Tell us about you",
          lede:
            "A name and a few everyday details help September suggest words that sound more like you.",
          helper: "This stays on this device.",
          button: "Save and continue",
          body: `
            <div class="fields">
              <div>
                <label for="name">Your name</label>
                <input id="name" value="Ravi" />
              </div>
              <div>
                <label for="style">How should September sound?</label>
                <textarea id="style">Warm, direct, and patient. I like short sentences for care needs and more expressive sentences with family.</textarea>
              </div>
            </div>
          `,
        },
        {
          kicker: "Step 3 of 4",
          title: "Choose a voice",
          lede:
            "Start with the built-in voice, or connect a speech service for more voice choices.",
          helper: "You can change voice settings later.",
          button: "Use this voice",
          body: `
            <div class="choices">
              <button class="choice selected" type="button">
                <span class="choice-dot">1</span>
                <span>
                  <span class="choice-title">Use the built-in voice</span>
                  <span class="choice-copy">Recommended. Works now with no extra setup.</span>
                </span>
              </button>
              <button class="choice" type="button">
                <span class="choice-dot">2</span>
                <span>
                  <span class="choice-title">Connect ElevenLabs</span>
                  <span class="choice-copy">More realistic voices if ElevenLabs is already set up.</span>
                </span>
              </button>
              <button class="choice" type="button">
                <span class="choice-dot">3</span>
                <span>
                  <span class="choice-title">Connect Gemini speech</span>
                  <span class="choice-copy">Cloud voices from Google if Gemini is already set up.</span>
                </span>
              </button>
            </div>
          `,
        },
        {
          kicker: "Step 4 of 4",
          title: "Help suggestions fit you",
          lede:
            "September can suggest phrases using built-in help, a connected AI service, and your own words.",
          helper: "Skip anything you do not have ready.",
          button: "Finish setup",
          body: `
            <div class="choices">
              <button class="choice selected" type="button">
                <span class="choice-dot">1</span>
                <span>
                  <span class="choice-title">Use built-in suggestions</span>
                  <span class="choice-copy">Recommended. Works now without extra setup.</span>
                </span>
              </button>
              <button class="choice" type="button">
                <span class="choice-dot">2</span>
                <span>
                  <span class="choice-title">Connect OpenRouter</span>
                  <span class="choice-copy">One connection for many AI models.</span>
                </span>
              </button>
              <button class="choice" type="button">
                <span class="choice-dot">3</span>
                <span>
                  <span class="choice-title">Add words September should learn</span>
                  <span class="choice-copy">Names, care phrases, favorite topics, or pasted notes.</span>
                </span>
              </button>
            </div>
            <div class="note">You can paste names, care phrases, routines, or notes here later.</div>
          `,
        },
      ];

      let current = 0;
      const dots = Array.from(document.querySelectorAll(".step-dot"));
      const body = document.getElementById("body");
      const kicker = document.getElementById("kicker");
      const title = document.getElementById("title");
      const lede = document.getElementById("lede");
      const helper = document.getElementById("helper");
      const next = document.getElementById("next");
      const back = document.getElementById("back");

      function render() {
        const step = steps[current];
        kicker.textContent = step.kicker;
        title.textContent = step.title;
        lede.textContent = step.lede;
        helper.textContent = step.helper;
        next.textContent = step.button;
        back.style.visibility = current === 0 ? "hidden" : "visible";
        body.innerHTML = step.body;

        dots.forEach((dot, index) => {
          dot.classList.toggle("done", index < current);
          dot.setAttribute("aria-current", index === current ? "step" : "false");
          dot.textContent = index < current ? "OK" : index + 1;
        });
      }

      dots.forEach((dot) => {
        dot.addEventListener("click", () => {
          current = Number(dot.dataset.step);
          render();
        });
      });

      next.addEventListener("click", () => {
        current = Math.min(current + 1, steps.length - 1);
        render();
      });

      back.addEventListener("click", () => {
        current = Math.max(current - 1, 0);
        render();
      });

      render();
    </script>
  </body>
</html>
