<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>September QWERTY Keyboard Mock</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f4f4f5;
        --panel: #ffffff;
        --panel-soft: #fafafa;
        --foreground: #18181b;
        --muted: #71717a;
        --border: #d4d4d8;
        --border-strong: #a1a1aa;
        --primary: #4f46e5;
        --primary-soft: #eef2ff;
        --primary-border: #c7d2fe;
        --shadow: 0 20px 60px rgba(24, 24, 27, 0.14);
        --radius: 14px;
        --key-radius: 8px;
        --gap: 8px;
        --key: 56px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(79, 70, 229, 0.08), transparent 34%),
          var(--background);
        color: var(--foreground);
        font-family: "Noto Sans", Helvetica, sans-serif;
      }

      .stage {
        width: min(1180px, calc(100vw - 32px));
        padding: 24px;
      }

      .keyboard {
        overflow: hidden;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .titlebar {
        height: 44px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 16px;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, #ffffff, #f4f4f5);
      }

      .window-controls {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .window-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        border: 1px solid var(--border-strong);
        background: #f4f4f5;
      }

      .title {
        justify-self: center;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--primary);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-soft);
      }

      .text-preview {
        min-height: 48px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #ffffff;
        color: var(--muted);
        font-size: 16px;
      }

      .speak-button {
        min-width: 112px;
        min-height: 48px;
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: white;
        font: inherit;
        font-size: 16px;
        font-weight: 700;
      }

      .suggestions {
        display: flex;
        gap: 10px;
        padding: 0 16px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-soft);
        overflow-x: auto;
      }

      .suggestion {
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid var(--primary-border);
        border-radius: 999px;
        background: var(--primary-soft);
        color: #3730a3;
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
      }

      .keyboard-body {
        overflow-x: auto;
        padding: 16px;
        background: linear-gradient(180deg, #ffffff, #f8fafc);
      }

      .key-grid {
        width: max-content;
        min-width: 100%;
        display: grid;
        gap: var(--gap);
      }

      .row {
        display: flex;
        justify-content: center;
        gap: var(--gap);
      }

      .key {
        appearance: none;
        min-width: var(--key);
        height: 52px;
        padding: 0 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-bottom-color: var(--border-strong);
        border-radius: var(--key-radius);
        background: linear-gradient(180deg, #ffffff, #f4f4f5);
        color: var(--foreground);
        box-shadow: 0 1px 0 rgba(24, 24, 27, 0.05);
        font: inherit;
        font-size: 16px;
        font-weight: 650;
      }

      .key:hover,
      .suggestion:hover,
      .speak-button:hover {
        filter: brightness(0.98);
      }

      .key:focus-visible,
      .suggestion:focus-visible,
      .speak-button:focus-visible {
        outline: 3px solid rgba(79, 70, 229, 0.38);
        outline-offset: 2px;
      }

      .key.utility {
        background: linear-gradient(180deg, #f8fafc, #e4e4e7);
        color: #3f3f46;
        font-size: 14px;
      }

      .key.primary {
        border-color: var(--primary-border);
        background: linear-gradient(180deg, #eef2ff, #e0e7ff);
        color: #3730a3;
      }

      .key.wide {
        min-width: calc(var(--key) * 1.45);
      }

      .key.xwide {
        min-width: calc(var(--key) * 2.1);
      }

      .key.space {
        min-width: calc(var(--key) * 5.4);
      }

      .key.small {
        min-width: 46px;
      }

      @media (max-width: 860px) {
        .stage {
          width: 100vw;
          padding: 12px;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .speak-button {
          width: 100%;
        }

        :root {
          --key: 48px;
          --gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="keyboard" aria-label="September accessibility keyboard mock">
        <header class="titlebar">
          <div class="window-controls" aria-hidden="true">
            <span class="window-dot"></span>
            <span class="window-dot"></span>
          </div>
          <div class="title">September Keyboard - QWERTY</div>
          <span class="status-dot" aria-hidden="true"></span>
        </header>

        <div class="composer">
          <div class="text-preview" aria-label="Current text">I want to say...</div>
          <button class="speak-button" type="button">Speak</button>
        </div>

        <div class="suggestions" aria-label="Suggestions">
          <button class="suggestion" type="button">Yes</button>
          <button class="suggestion" type="button">No</button>
          <button class="suggestion" type="button">Thank you</button>
          <button class="suggestion" type="button">One moment</button>
          <button class="suggestion" type="button">I need help</button>
        </div>

        <div class="keyboard-body">
          <div class="key-grid" role="group" aria-label="QWERTY keys">
            <div class="row">
              <button class="key utility small" type="button">Esc</button>
              <button class="key utility small" type="button">Undo</button>
              <button class="key utility small" type="button">Redo</button>
              <button class="key utility small" type="button">Cut</button>
              <button class="key utility small" type="button">Copy</button>
              <button class="key utility small" type="button">Paste</button>
              <button class="key utility small" type="button">Left</button>
              <button class="key utility small" type="button">Right</button>
              <button class="key utility small" type="button">Mute</button>
              <button class="key utility small" type="button">Vol</button>
              <button class="key utility small" type="button">Menu</button>
            </div>

            <div class="row">
              <button class="key" type="button">`</button>
              <button class="key" type="button">1</button>
              <button class="key" type="button">2</button>
              <button class="key" type="button">3</button>
              <button class="key" type="button">4</button>
              <button class="key" type="button">5</button>
              <button class="key" type="button">6</button>
              <button class="key" type="button">7</button>
              <button class="key" type="button">8</button>
              <button class="key" type="button">9</button>
              <button class="key" type="button">0</button>
              <button class="key" type="button">-</button>
              <button class="key" type="button">=</button>
              <button class="key utility wide" type="button">Delete</button>
            </div>

            <div class="row">
              <button class="key utility wide" type="button">Tab</button>
              <button class="key" type="button">Q</button>
              <button class="key" type="button">W</button>
              <button class="key" type="button">E</button>
              <button class="key" type="button">R</button>
              <button class="key" type="button">T</button>
              <button class="key" type="button">Y</button>
              <button class="key" type="button">U</button>
              <button class="key" type="button">I</button>
              <button class="key" type="button">O</button>
              <button class="key" type="button">P</button>
              <button class="key" type="button">[</button>
              <button class="key" type="button">]</button>
              <button class="key" type="button">\</button>
            </div>

            <div class="row">
              <button class="key utility xwide" type="button">Caps</button>
              <button class="key" type="button">A</button>
              <button class="key" type="button">S</button>
              <button class="key" type="button">D</button>
              <button class="key" type="button">F</button>
              <button class="key" type="button">G</button>
              <button class="key" type="button">H</button>
              <button class="key" type="button">J</button>
              <button class="key" type="button">K</button>
              <button class="key" type="button">L</button>
              <button class="key" type="button">;</button>
              <button class="key" type="button">'</button>
              <button class="key utility xwide" type="button">Return</button>
            </div>

            <div class="row">
              <button class="key utility xwide" type="button">Shift</button>
              <button class="key" type="button">Z</button>
              <button class="key" type="button">X</button>
              <button class="key" type="button">C</button>
              <button class="key" type="button">V</button>
              <button class="key" type="button">B</button>
              <button class="key" type="button">N</button>
              <button class="key" type="button">M</button>
              <button class="key" type="button">,</button>
              <button class="key" type="button">.</button>
              <button class="key" type="button">/</button>
              <button class="key utility xwide" type="button">Shift</button>
            </div>

            <div class="row">
              <button class="key utility" type="button">Fn</button>
              <button class="key utility" type="button">Ctrl</button>
              <button class="key utility" type="button">Opt</button>
              <button class="key utility" type="button">Cmd</button>
              <button class="key primary space" type="button">Space</button>
              <button class="key utility" type="button">Cmd</button>
              <button class="key utility" type="button">Opt</button>
              <button class="key utility" type="button" aria-label="Left Arrow">&larr;</button>
              <button class="key utility" type="button" aria-label="Down Arrow">&darr;</button>
              <button class="key utility" type="button" aria-label="Up Arrow">&uarr;</button>
              <button class="key utility" type="button" aria-label="Right Arrow">&rarr;</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
